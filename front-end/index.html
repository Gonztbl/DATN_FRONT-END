<!DOCTYPE html>
<html lang="en" class="light">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>E-Wallet</title>

  <link href="https://fonts.googleapis.com/css2?family=Spline+Sans:wght@300;400;500;600;700&display=swap"
    rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap"
    rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />

  <!-- Trong public/index.html hoặc src/index.html -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Spline+Sans:wght@300;400;500;600;700&display=swap"
    rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap"
    rel="stylesheet" />
  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com" rel="preconnect" />
  <link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect" />
  <link href="https://fonts.googleapis.com/css2?family=Spline+Sans:wght@300;400;500;600;700&display=swap"
    rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans:wght@300;400;500;600;700&display=swap"
    rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
    rel="stylesheet" />
  <!-- Material Symbols -->
  <link
    href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200"
    rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <script>
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          colors: {
            primary: '#059669', // Emerald 600
            secondary: '#ecfdf5', // Emerald 50
            accent: '#10b981', // Emerald 500
            'gold': '#FFD700',
            'deep-green': '#064e3b',
            "background-light": "#f6f8f7",
            "background-dark": "#112117",
            "text-main": "#111714",
            "text-secondary": "#648772",
            "border-color": "#dce5df",
          },
          fontFamily: {
            sans: ['Inter', 'sans-serif'],
            display: ["Spline Sans", "sans-serif"],
          },
          borderRadius: {
            DEFAULT: "1rem",
            lg: "2rem",
            xl: "3rem",
            full: "9999px",
            'custom': '8px',
          },
          animation: {
            'float': 'float 6s ease-in-out infinite',
            'float-delayed': 'float 7s ease-in-out infinite 1s',
            'float-slow': 'float 8s ease-in-out infinite 0.5s',
            'fade-in-up': 'fadeInUp 0.8s ease-out forwards',
            'pulse-soft': 'pulseSoft 3s infinite',
            'scroll': 'scroll 25s linear infinite',
            'spin-slow': 'spin 12s linear infinite',
          },
          backgroundImage: {
            'mesh': 'radial-gradient(at 40% 20%, hsla(148,100%,77%,1) 0px, transparent 50%), radial-gradient(at 80% 0%, hsla(189,100%,56%,1) 0px, transparent 50%), radial-gradient(at 0% 50%, hsla(340,100%,76%,0) 0px, transparent 50%), radial-gradient(at 80% 50%, hsla(356,100%,81%,0) 0px, transparent 50%), radial-gradient(at 0% 100%, hsla(22,100%,77%,0) 0px, transparent 50%), radial-gradient(at 80% 100%, hsla(242,100%,70%,0) 0px, transparent 50%), radial-gradient(at 0% 0%, hsla(343,100%,76%,0) 0px, transparent 50%)',
          },
          keyframes: {
            float: {
              '0%, 100%': { transform: 'translateY(0)' },
              '50%': { transform: 'translateY(-20px)' },
            },
            fadeInUp: {
              '0%': { opacity: '0', transform: 'translateY(20px)' },
              '100%': { opacity: '1', transform: 'translateY(0)' },
            },
            pulseSoft: {
              '0%, 100%': { opacity: '1' },
              '50%': { opacity: '0.8' },
            },
            scroll: {
              '0%': { transform: 'translateX(0)' },
              '100%': { transform: 'translateX(-100%)' },
            }
          }
        },
      },
    };
  </script>
</head>

<body>
  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>
</body>

</html>
